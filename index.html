<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Який ти котик ФТІТ?</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Geologica:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F3EF;
    --card: #FFFFFF;
    --text: #1A1A2E;
    --muted: #7A7A8C;
    --accent: #5B4FD4;
    --accent-light: #EAE8FA;
    --border: rgba(26,26,46,0.1);
    --radius: 16px;
  }

  body {
    font-family: 'Geologica', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
    max-width: 560px;
  }

  .badge {
    display: inline-block;
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    background: var(--accent);
    color: #fff;
    padding: 5px 14px;
    border-radius: 100px;
    margin-bottom: 1rem;
    text-transform: uppercase;
  }

  h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(22px, 5vw, 34px);
    font-weight: 700;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 0.75rem;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 15px;
    color: var(--muted);
    font-weight: 300;
    line-height: 1.6;
  }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 2rem;
    width: 100%;
    max-width: 560px;
    box-shadow: 0 2px 24px rgba(0,0,0,0.05);
  }

  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.75rem;
  }

  .progress-bar {
    flex: 1;
    height: 5px;
    background: var(--accent-light);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .progress-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    white-space: nowrap;
    font-family: 'Unbounded', sans-serif;
  }

  .q-text {
    font-size: 18px;
    font-weight: 500;
    line-height: 1.5;
    color: var(--text);
    margin-bottom: 1.5rem;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .opt-btn {
    background: var(--bg);
    border: 1.5px solid transparent;
    border-radius: 12px;
    padding: 14px 18px;
    text-align: left;
    font-family: 'Geologica', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
    cursor: pointer;
    transition: all 0.18s ease;
    line-height: 1.5;
  }

  .opt-btn:hover {
    background: var(--accent-light);
    border-color: var(--accent);
    color: var(--accent);
    transform: translateX(3px);
  }

  .opt-btn.picked {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    transform: translateX(3px);
  }

  /* RESULT */
  .result-emoji {
    font-size: 56px;
    display: block;
    text-align: center;
    margin-bottom: 1rem;
    animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .result-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 6px;
  }

  .result-name {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(16px, 4vw, 20px);
    font-weight: 700;
    text-align: center;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .result-program {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .result-desc-box {
    background: var(--accent-light);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    font-size: 14px;
    line-height: 1.7;
    color: #3D3580;
    margin-bottom: 1.5rem;
  }

  .others-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-family: 'Unbounded', sans-serif;
    margin-bottom: 10px;
  }

  .other-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
  }
  .other-item:last-child { border-bottom: none; }

  .other-emoji { font-size: 18px; width: 24px; text-align: center; }

  .other-name {
    flex: 1;
    font-size: 13px;
    color: var(--text);
  }

  .other-bar-wrap {
    width: 80px;
    height: 5px;
    background: var(--accent-light);
    border-radius: 3px;
    overflow: hidden;
  }

  .other-bar {
    height: 100%;
    border-radius: 3px;
    background: var(--accent);
    opacity: 0.5;
  }

  .restart-btn {
    display: block;
    width: 100%;
    margin-top: 1.5rem;
    padding: 13px;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .restart-btn:hover { opacity: 0.82; }

  footer {
    margin-top: 2rem;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }

  @media (max-width: 480px) {
    .card { padding: 1.5rem; }
  }
</style>
</head>
<body>

<header>
  <div class="badge">ФТІТ · Квіз для абітурієнтів</div>
  <h1>Який ти <span>котик ФТІТ</span>?</h1>
  <p class="subtitle">8 питань — і ми підберемо спеціальність, що підходить саме тобі</p>
</header>

<div class="card" id="card">
  <div id="quiz-area"></div>
</div>

<footer>Факультет транспортних та інформаційних технологій</footer>

<script>
const specs = {
  B13: { name: "Бібліотечна та архівна справа", program: "Управління інформаційно-аналітичною діяльністю", emoji: "📚", desc: "Ти — охоронець знань і майстер пошуку інформації. Тебе цікавить, як організовувати, зберігати та поширювати знання. З тобою жодна важлива інформація не загубиться!" },
  F2:  { name: "Інженерія програмного забезпечення", program: "Інженерія програмного забезпечення", emoji: "💻", desc: "Ти — будівничий цифрового світу. Код для тебе — це мова, якою можна сказати все. Ти любиш структуру, чисту архітектуру і те, коли все працює як годинник." },
  F3a: { name: "Комп'ютерні науки та AI", program: "Комп'ютерні науки та штучний інтелект", emoji: "🤖", desc: "Ти — дослідник майбутнього. Тебе захоплює, як машини навчаються мислити. Нейронні мережі, датасети і моделі — твоя стихія." },
  F3b: { name: "Комп'ютерні технології даних", program: "Комп'ютерні технології обробки даних", emoji: "📊", desc: "Ти — детектив серед даних. Де інші бачать хаос цифр, ти знаходиш закономірності та інсайти. Дані — твій найкращий матеріал." },
  G7:  { name: "Автоматизація та робототехніка", program: "Робототехніка та комп'ютеризовані системи управління", emoji: "🦾", desc: "Ти — інженер, що оживляє машини. Тебе тягне до фізичного світу: мікроконтролери, датчики, маніпулятори. Ти хочеш, щоб твій код рухав реальні об'єкти." },
  J8a: { name: "Транспортні технології", program: "Автомобільні перевезення та транспортні технології", emoji: "🚛", desc: "Ти — організатор руху. Тобі цікаво, як влаштована логістика вантажів, безпека на дорогах і ефективність транспортних систем." },
  J8b: { name: "Міжнародні перевезення", program: "Організація міжнародних перевезень", emoji: "✈️", desc: "Ти — людина світу. Тебе приваблює міжнародна логістика, митниця, глобальні маршрути. Ти мислиш у масштабах континентів." },
  J8c: { name: "Митна справа", program: "Митна справа у транспортній галузі", emoji: "🛃", desc: "Ти — людина порядку та правил. Тебе цікавить, як регулюються товари на кордонах, яка документація потрібна і як не допустити порушень." },
  J8d: { name: "Транспортно-логістичні системи", program: "Транспортно-логістичні системи вантажних перевезень", emoji: "📦", desc: "Ти — системний мислитель. Ти бачиш логістику як єдину систему з потоками та оптимізацією. Твоя мета — щоб усе їхало швидше та дешевше." },
  J8e: { name: "Розумний транспорт і логістика", program: "Розумний транспорт і логістика для міст", emoji: "🏙️", desc: "Ти — урбаніст-новатор. Тебе хвилює місто майбутнього: розумні зупинки, безпілотні авто, зелена логістика. Ти хочеш зробити міста зручнішими." }
};

const questions = [
  {
    text: "Суботній ранок. Чим займешся?",
    options: [
      { text: "Читаю щось цікаве та зберігаю нотатки в базу знань", scores: { B13: 3 } },
      { text: "Пишу код — з'явилась класна ідея для проєкту", scores: { F2: 3 } },
      { text: "Дивлюсь відео про AI або граюсь з моделлю", scores: { F3a: 3 } },
      { text: "Їду за місто або планую маршрут подорожі", scores: { J8a: 2, J8b: 1 } }
      { text: "Їду за місто або планую маршрут подорожі", scores: { J8a: 2, J8b: 1 } }
      { text: "Їду за місто або планую маршрут подорожі", scores: { J8a: 2, J8b: 1 } }
      { text: "Їду за місто або планую маршрут подорожі", scores: { J8a: 2, J8b: 1 } }
    ]
  },
  {
    text: "Що тебе найбільше захоплює в технологіях?",
    options: [
      { text: "Як машини навчаються приймати рішення самостійно", scores: { F3a: 3 } },
      { text: "Як правильно зберігати та передавати знання", scores: { B13: 3 } },
      { text: "Як зробити робота, який реагує на реальний світ", scores: { G7: 3 } },
      { text: "Як оптимізувати маршрути і скоротити витрати", scores: { J8d: 3, J8e: 1 } }
    ]
  },
  {
    text: "Уявімо, тобі дали великий набір даних. Перша думка?",
    options: [
      { text: "Починаю шукати приховані закономірності та аномалії", scores: { F3b: 3 } },
      { text: "Пишу програму для автоматичної обробки", scores: { F2: 2, F3a: 1 } },
      { text: "Думаю, як це допоможе покращити транспортну систему", scores: { J8d: 2, J8e: 2 } },
      { text: "Архівую та каталогізую — хай лежить акуратно", scores: { B13: 3 } }
    ]
  },
  {
    text: "Який проєкт здається найцікавішим?",
    options: [
      { text: "Система управління складом і доставкою товарів", scores: { J8d: 3 } },
      { text: "Розумне місто з автоматичним регулюванням трафіку", scores: { J8e: 3, G7: 1 } },
      { text: "Chatbot або генеративна AI-модель", scores: { F3a: 3 } },
      { text: "Програма для обліку документів та архівів", scores: { B13: 2, F2: 1 } }
    ]
  },
  {
    text: "Що найбільше дратує в сучасній Україні?",
    options: [
      { text: "Корупція на митниці та непрозорість кордонів", scores: { J8c: 3 } },
      { text: "Пробки та неефективна логістика у містах", scores: { J8e: 3 } },
      { text: "Складно знайти потрібну інформацію в архівах і держорганах", scores: { B13: 3 } },
      { text: "Застаріле виробництво без автоматизації", scores: { G7: 3 } }
    ]
  },
  {
    text: "Де ти себе бачиш після університету?",
    options: [
      { text: "IT-компанія: розробка або дані", scores: { F2: 2, F3a: 1, F3b: 2 } },
      { text: "Міжнародна логістична або транспортна компанія", scores: { J8b: 3, J8d: 1 } },
      { text: "Стартап у сфері розумних міст або mobility", scores: { J8e: 3 } },
      { text: "Дослідницька установа, бібліотека або держорган", scores: { B13: 3 } }
    ]
  },
  {
    text: "Який предмет міг би стати улюбленим?",
    options: [
      { text: "Машинне навчання та нейронні мережі", scores: { F3a: 3 } },
      { text: "Митне право та міжнародна торгівля", scores: { J8c: 3 } },
      { text: "Алгоритми та структури даних", scores: { F2: 2, F3b: 1 } },
      { text: "Робототехніка та мікроконтролери", scores: { G7: 3 } }
    ]
  },
  {
    text: "Друг просить допомогти з переїздом у інше місто. Твоя роль?",
    options: [
      { text: "Прораховую найдешевший та найшвидший маршрут", scores: { J8d: 2, J8a: 1 } },
      { text: "Організовую документи та списки речей по категоріях", scores: { B13: 2, J8c: 1 } },
      { text: "Пишу скрипт, який автоматизує пошук квартир", scores: { F2: 2 } },
      { text: "Шукаю міжнародні варіанти та перевізників", scores: { J8b: 3 } }
    ]
  }
];

let current = 0;
let scores = {};
Object.keys(specs).forEach(k => scores[k] = 0);

function render() {
  const area = document.getElementById('quiz-area');
  if (current >= questions.length) { renderResult(area); return; }
  const q = questions[current];
  const pct = Math.round((current / questions.length) * 100);
  area.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span class="progress-label">${current + 1} / ${questions.length}</span>
    </div>
    <div class="q-text">${q.text}</div>
    <div class="options">
      ${q.options.map((o, i) => `<button class="opt-btn" onclick="choose(${i})">${o.text}</button>`).join('')}
    </div>`;
}

function choose(idx) {
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b => b.disabled = true);
  btns[idx].classList.add('picked');
  const s = questions[current].options[idx].scores;
  Object.entries(s).forEach(([k, v]) => { scores[k] = (scores[k] || 0) + v; });
  setTimeout(() => { current++; render(); }, 320);
}

function renderResult(area) {
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const [topKey] = sorted[0];
  const sp = specs[topKey];
  const maxScore = sorted[0][1] || 1;

  const othersHtml = sorted.slice(1, 5).map(([k, v]) => {
    const s = specs[k];
    const pct = Math.round((v / maxScore) * 100);
    return `<div class="other-item">
      <span class="other-emoji">${s.emoji}</span>
      <span class="other-name">${s.name}</span>
      <div class="other-bar-wrap"><div class="other-bar" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');

  area.innerHTML = `
    <span class="result-emoji">${sp.emoji}</span>
    <div class="result-label">Твоя спеціальність</div>
    <div class="result-name">${sp.name}</div>
    <div class="result-program">Освітня програма: ${sp.program}</div>
    <div class="result-desc-box">${sp.desc}</div>
    <div class="others-title">Також підходять</div>
    ${othersHtml}
    <button class="restart-btn" onclick="restart()">↺ Пройти ще раз</button>`;
}

function restart() {
  current = 0;
  Object.keys(specs).forEach(k => scores[k] = 0);
  render();
}

render();
</script>
</body>
</html>
